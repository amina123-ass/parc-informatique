# ──────────────────────────────────────────────────────────
# Nginx – Configuration Backend Laravel
# Accessible sur http://192.168.1.45:8002
# ──────────────────────────────────────────────────────────

server {
    listen       80;
    server_name  192.168.1.45 localhost;

    root   /var/www/html/public;
    index  index.php index.html;

    # ── Charset ────────────────────────────────────────────
    charset utf-8;

    # ── Logs ───────────────────────────────────────────────
    access_log /var/log/nginx/parc_access.log;
    error_log  /var/log/nginx/parc_error.log;

    # ── Taille max des uploads ─────────────────────────────
    client_max_body_size 64M;

    # ── Gzip ───────────────────────────────────────────────
    gzip            on;
    gzip_types      text/plain application/json application/javascript text/css;
    gzip_min_length 1000;

    # ── Route principale ───────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── PHP-FPM ────────────────────────────────────────────
    location ~ \.php$ {
        try_files              $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass           app:9000;
        fastcgi_index          index.php;
        include                fastcgi_params;
        fastcgi_param          SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param          PATH_INFO $fastcgi_path_info;
        fastcgi_read_timeout   300;
        fastcgi_buffer_size    16k;
        fastcgi_buffers        4 16k;
    }

    # ── CORS Headers ───────────────────────────────────────
    add_header 'Access-Control-Allow-Origin'  'http://192.168.1.45:5173' always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, X-Requested-With' always;
    add_header 'Access-Control-Allow-Credentials' 'true' always;

    location ~ /\.ht {
        deny all;
    }

    # ── Fichiers statiques ─────────────────────────────────
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|ttf|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}