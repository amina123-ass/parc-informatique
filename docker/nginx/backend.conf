# Remplacer directement le fichier
cat > ~/parc-informatique/docker/nginx/backend.conf << 'EOF'
server {
    listen       80;
    server_name  192.168.1.45 localhost;

    root   /var/www/html/public;
    index  index.php index.html;

    charset utf-8;

    access_log /var/log/nginx/parc_access.log;
    error_log  /var/log/nginx/parc_error.log;

    client_max_body_size 64M;

    gzip            on;
    gzip_types      text/plain application/json application/javascript text/css;
    gzip_min_length 1000;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files               $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass            app:9000;
        fastcgi_index           index.php;
        include                 fastcgi_params;
        fastcgi_param           SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param           PATH_INFO $fastcgi_path_info;
        fastcgi_read_timeout    300;
        fastcgi_buffer_size     16k;
        fastcgi_buffers         4 16k;
    }

    location ~ /\.ht {
        deny all;
    }

    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|ttf|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}
EOF

# Vérifier que le fichier est bien mis à jour (doit retourner VIDE)
grep -i "access-control" ~/parc-informatique/docker/nginx/backend.conf

# Recréer le conteneur nginx
cd ~/parc-informatique/docker
docker compose stop nginx
docker compose rm -f nginx
docker compose up -d nginx

# Tester
sleep 2 && curl -s -X OPTIONS \
  "http://192.168.1.45:8003/api/auth/login" \
  -H "Origin: http://192.168.1.45:5173" \
  -H "Access-Control-Request-Method: POST" \
  -H "Access-Control-Request-Headers: Content-Type,Authorization" \
  -D - | grep -i "access-control"
```

