# ──────────────────────────────────────────────────────────
# Nginx – Configuration Frontend React (SPA)
# Accessible sur http://192.168.1.45:5173
# ──────────────────────────────────────────────────────────

server {
    listen      80;
    server_name 192.168.1.45 localhost;
    root        /usr/share/nginx/html;
    index       index.html;

    charset utf-8;

    # ── Gzip ───────────────────────────────────────────────
    gzip            on;
    gzip_types      text/plain application/json application/javascript
                    text/css application/xml text/xml image/svg+xml;
    gzip_min_length 1000;
    gzip_vary       on;

    # ── SPA – toutes les routes vers index.html ────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Assets statiques – cache long terme ───────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Sécurité ───────────────────────────────────────────
    location ~ /\.ht {
        deny all;
    }
}
